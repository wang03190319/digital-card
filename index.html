<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cillian Wang</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background: radial-gradient(circle at center,#020617,#000);
    overflow:hidden;
}

/* 背景光 */
.bg-glow{
    position:fixed;
    width:600px;height:600px;
    background:radial-gradient(circle,rgba(56,189,248,0.3),transparent 70%);
    filter:blur(80px);
    pointer-events:none;
    transform:translate(-50%,-50%);
}

/* 外層 */
.card-wrapper{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 卡片 */
.card{
    width:min(720px,92%);
    padding:40px;
    border-radius:25px;

    display:flex;
    gap:40px;
    align-items:center;

    background:rgba(15,23,42,0.9);
    backdrop-filter:blur(25px);

    transition:transform 0.15s;
}

/* 七彩邊框 */
.card::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:25px;
    padding:2px;

    background:linear-gradient(270deg,#00f0ff,#8b5cf6,#ff2d95,#00f0ff);
    background-size:300%;
    animation:borderMove 6s linear infinite;

    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;

    z-index:-1;
}

@keyframes borderMove{
    0%{background-position:0%}
    100%{background-position:300%}
}

/* 頭像 */
.avatar{
    width:150px;height:150px;
    border-radius:50%;
    background:url('me.jpg') center/cover;
    box-shadow:0 0 25px rgba(56,189,248,0.5);
}

/* 內容 */
.content{flex:1;}
h1{color:white;}
.subtitle{color:#94a3b8;}
.intro{margin-top:10px;color:#cbd5f5;}

/* 技能 */
.skills span{
    display:inline-block;
    margin:4px;
    padding:6px 12px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
}

/* 按鈕 */
.btn{
    position:relative;
    display:inline-block;
    margin:6px;
    padding:10px 20px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    color:white;
    border:1px solid rgba(255,255,255,0.2);
    overflow:hidden;
    transition:0.25s;
}

.btn:hover{
    transform:translateY(-4px) scale(1.08);
    box-shadow:0 0 20px rgba(56,189,248,0.6);
}

.btn::before{
    content:"";
    position:absolute;
    left:-120%;
    top:0;
    width:100%;height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
    transition:0.6s;
}
.btn:hover::before{left:120%;}

/* ripple */
.btn-ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.6);
    transform:translate(-50%,-50%);
    animation:ripple 0.6s ease-out;
}
@keyframes ripple{
    to{width:150px;height:150px;opacity:0;}
}

/* ===== 彈出頁 ===== */
.modal{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(15px);

    opacity:0;
    transition:0.3s;
}

.modal.show{
    display:flex;
    opacity:1;
}

.modal-content{
    background:rgba(15,23,42,0.95);
    padding:30px 40px;
    border-radius:20px;
    color:white;

    transform:scale(0.8);
    opacity:0;
    transition:0.3s;

    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.modal.show .modal-content{
    transform:scale(1);
    opacity:1;
}

/* 手機 */
@media(max-width:768px){
    body{overflow:auto;}
    .card{
        flex-direction:column;
        text-align:center;
        padding:25px;
    }
    .avatar{width:120px;height:120px;}
}
</style>
</head>

<body>

<div class="bg-glow" id="bg"></div>

<div class="card-wrapper">
    <div class="card" id="card">

        <div class="avatar"></div>

        <div class="content">
            <h1 id="typing"></h1>
            <p class="subtitle">AI工程｜醫療影像｜INTJ</p>

            <p class="intro">
            專注於人工智慧與醫療影像，將電腦視覺應用於實際問題。
            </p>

            <div class="skills">
                <span>AI</span>
                <span>Computer Vision</span>
                <span>YOLO</span>
                <span>Python</span>
            </div>

            <div>
                <a href="#" class="btn" onclick="openPopup(event,'github')">GitHub</a>
                <a href="#" class="btn" onclick="openPopup(event,'email')">Email</a>
                <a href="#" class="btn" onclick="openPopup(event,'ig')">Instagram</a>
            </div>
        </div>

    </div>
</div>

<!-- Popup -->
<div id="modal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
/* 打字 */
const text="王俊詠 (Cillian Wang)";
let i=0;
function typing(){
    if(i<text.length){
        document.getElementById("typing").innerHTML+=text.charAt(i);
        i++;
        setTimeout(typing,60);
    }
}
typing();

/* 背景光 */
document.addEventListener("mousemove",e=>{
    const bg=document.getElementById("bg");
    bg.style.left=e.clientX+"px";
    bg.style.top=e.clientY+"px";
});

/* 卡片視差 */
const card=document.getElementById("card");
document.addEventListener("mousemove",e=>{
    const x=(window.innerWidth/2 - e.clientX)/25;
    const y=(window.innerHeight/2 - e.clientY)/25;
    card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

/* Popup */
function openPopup(e,type){
    e.preventDefault();

    const modal=document.getElementById("modal");
    const content=document.getElementById("modalContent");

    if(type==="github"){
        content.innerHTML="<h2>GitHub</h2><p>YOLO + 機械手臂專案</p>";
    }
    if(type==="email"){
        content.innerHTML="<h2>Email</h2><p>cillian@example.com</p>";
    }
    if(type==="ig"){
        content.innerHTML="<h2>Instagram</h2><p>學習與生活分享</p>";
    }

    modal.style.display="flex";

    setTimeout(()=>modal.classList.add("show"),10);
}

function closeModal(e){
    if(e.target.id==="modal"){
        const modal=document.getElementById("modal");
        modal.classList.remove("show");
        setTimeout(()=>modal.style.display="none",300);
    }
}

/* ripple */
document.querySelectorAll(".btn").forEach(btn=>{
    btn.addEventListener("click",function(e){
        const ripple=document.createElement("span");
        ripple.className="btn-ripple";

        const rect=btn.getBoundingClientRect();
        ripple.style.left=(e.clientX-rect.left)+"px";
        ripple.style.top=(e.clientY-rect.top)+"px";

        btn.appendChild(ripple);
        setTimeout(()=>ripple.remove(),600);
    });
});
</script>

</body>
</html>
